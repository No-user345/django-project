{% extends "layout.html" %}

{% block title%}
{{post.title}}
{%endblock%}

{%block content%}
    <section>
        <img
            class = "banner"
            src="{{post.banner.url}}"
            alt="{{post.title}}"
        />
        <h1>{{post.title}}</h1>
        <P>{{post.date}}  by {{post.author}}</P>
        <P>{{post.body}} </P>
    </section>
{%endblock%}
